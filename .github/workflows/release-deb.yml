name: Build .deb package (dual-suite)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bookworm
            container: debian:bookworm
          - target: resolute
            container: ubuntu:26.04
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Bootstrap container
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git xz-utils zstd

      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          rev=${{ github.run_number }}
          echo "version=1.0-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"
          echo "tag=v1.0-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"


      - name: Build .deb
        run: |
          PKGVER="${{ steps.version.outputs.version }}"
          PKG="mbpfan-tray"
          DEB="${PKG}_${PKGVER}_all.deb"

          ROOT="$(pwd)/pkg"
          mkdir -p "${ROOT}/DEBIAN"

          make install DESTDIR="${ROOT}"

          cat > "${ROOT}/DEBIAN/control" << EOF
          Package: ${PKG}
          Version: ${PKGVER}
          Architecture: all
          Maintainer: graham@netlinux.co.uk
          Depends: python3, gir1.2-gtk-3.0, gir1.2-ayatanaappindicator3-0.1, libnotify-bin, mbpfan
          Section: utils
          Priority: optional
          Homepage: https://github.com/netlinux-ai/mbpfan-tray
          Description: Systray fan manager for MacBooks running mbpfan
           GTK3/AppIndicator systray app that shows CPU temperature and
           fan speed, and provides a GUI to adjust mbpfan temperature
           thresholds and fan speed limits. Changes are applied via
           pkexec and the mbpfan daemon is restarted automatically.
          EOF

          dpkg-deb --build "${ROOT}" "${DEB}"


      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: |
            **/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute tag
        id: tag
        run: echo "tag=v${{ github.run_number }}-dualsuite" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Build ${{ github.run_number }} (bookworm + resolute)
          body: |
            Dual-suite build from commit ${{ github.sha }}.
            Both ~bookworm1 and ~resolute1 .debs are attached.
          files: artifacts/**/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify package repository
        run: |
          sleep 5
          PAYLOAD='{"repo":"netlinux-ai/mbpfan-tray","tag":"${{ steps.tag.outputs.tag }}"}'
          SIGNATURE=$(echo -n "$PAYLOAD" \
            | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -binary \
            | xxd -p -c 256)
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=${SIGNATURE}" \
            -d "$PAYLOAD" \
            https://packages.netlinux.co.uk/webhook/update-repo
