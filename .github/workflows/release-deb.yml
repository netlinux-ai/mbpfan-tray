# Build manifest — replayed by the netlinux dev pipeline.
# Not auto-triggered in GHA; use `gh workflow run release-deb.yml` to
# run manually on a GitHub-hosted runner.
name: Build .deb package (dual-suite)
true:
  push:
    branches:
    - main
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: bookworm
          container: debian:bookworm
        - target: resolute
          container: ubuntu:26.04
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
    steps:
    - name: Bootstrap container
      run: "apt-get update\napt-get install -y --no-install-recommends \\\n  ca-certificates curl git xz-utils zstd \\\n \
        \ build-essential dpkg-dev sudo\n"
    - uses: actions/checkout@v4
    - name: Determine version
      id: version
      run: 'rev=${{ github.run_number }}

        echo "version=1.0-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"

        echo "tag=v1.0-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"

        '
    - name: Build .deb
      run: "PKGVER=\"${{ steps.version.outputs.version }}\"\nPKG=\"mbpfan-tray\"\nDEB=\"${PKG}_${PKGVER}_all.deb\"\n\nROOT=\"\
        $(pwd)/pkg\"\nmkdir -p \"${ROOT}/DEBIAN\"\n\nmake install DESTDIR=\"${ROOT}\"\n\ncat > \"${ROOT}/DEBIAN/control\"\
        \ << EOF\nPackage: ${PKG}\nVersion: ${PKGVER}\nArchitecture: all\nMaintainer: graham@netlinux.co.uk\nDepends: python3,\
        \ gir1.2-gtk-3.0, gir1.2-ayatanaappindicator3-0.1, libnotify-bin, mbpfan\nSection: utils\nPriority: optional\nHomepage:\
        \ https://github.com/netlinux-ai/mbpfan-tray\nDescription: Systray fan manager for MacBooks running mbpfan\n GTK3/AppIndicator\
        \ systray app that shows CPU temperature and\n fan speed, and provides a GUI to adjust mbpfan temperature\n thresholds\
        \ and fan speed limits. Changes are applied via\n pkexec and the mbpfan daemon is restarted automatically.\nEOF\n\n\
        dpkg-deb --build \"${ROOT}\" \"${DEB}\"\n"
    - uses: actions/upload-artifact@v4
      with:
        name: deb-${{ matrix.target }}
        path: '**/*.deb

          '
        if-no-files-found: error
  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Compute tag
      id: tag
      run: echo "tag=v${{ github.run_number }}-dualsuite" >> "$GITHUB_OUTPUT"
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Build ${{ github.run_number }} (bookworm + resolute)
        body: 'Dual-suite build from commit ${{ github.sha }}.

          Both ~bookworm1 and ~resolute1 .debs are attached.

          '
        files: artifacts/**/*.deb
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Notify package repository
      run: "sleep 5\nPAYLOAD='{\"repo\":\"netlinux-ai/mbpfan-tray\",\"tag\":\"${{ steps.tag.outputs.tag }}\"}'\nSIGNATURE=$(echo\
        \ -n \"$PAYLOAD\" \\\n  | openssl dgst -sha256 -hmac \"${{ secrets.WEBHOOK_SECRET }}\" -binary \\\n  | xxd -p -c 256)\n\
        curl -sf -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-Webhook-Signature: sha256=${SIGNATURE}\"\
        \ \\\n  -d \"$PAYLOAD\" \\\n  https://packages.netlinux.co.uk/webhook/update-repo\n"
'on':
  workflow_dispatch: null
