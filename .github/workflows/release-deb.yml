name: Build .deb package

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          rev=${{ github.run_number }}
          echo "version=1.0-${rev}netlinux1" >> "$GITHUB_OUTPUT"
          echo "tag=v1.0-${rev}netlinux1" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: |
          PKGVER="${{ steps.version.outputs.version }}"
          PKG="mbpfan-tray"
          DEB="${PKG}_${PKGVER}_all.deb"

          ROOT="$(pwd)/pkg"
          mkdir -p "${ROOT}/DEBIAN"

          make install DESTDIR="${ROOT}"

          cat > "${ROOT}/DEBIAN/control" << EOF
          Package: ${PKG}
          Version: ${PKGVER}
          Architecture: all
          Maintainer: graham@netlinux.co.uk
          Depends: python3, gir1.2-gtk-3.0, gir1.2-ayatanaappindicator3-0.1, libnotify-bin, mbpfan
          Section: utils
          Priority: optional
          Homepage: https://github.com/netlinux-ai/mbpfan-tray
          Description: Systray fan manager for MacBooks running mbpfan
           GTK3/AppIndicator systray app that shows CPU temperature and
           fan speed, and provides a GUI to adjust mbpfan temperature
           thresholds and fan speed limits. Changes are applied via
           pkexec and the mbpfan daemon is restarted automatically.
          EOF

          dpkg-deb --build "${ROOT}" "${DEB}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: mbpfan-tray ${{ steps.version.outputs.version }}
          body: |
            Systray fan manager for MacBooks running mbpfan.

            Automated build from commit ${{ github.sha }}

            Install: `sudo apt install mbpfan-tray`
          files: mbpfan-tray_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify package repository
        run: |
          sleep 5
          SIGNATURE=$(echo -n '{"repo":"netlinux-ai/mbpfan-tray","tag":"${{ steps.version.outputs.tag }}"}' \
            | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -binary \
            | xxd -p -c 256)
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=${SIGNATURE}" \
            -d '{"repo":"netlinux-ai/mbpfan-tray","tag":"${{ steps.version.outputs.tag }}"}' \
            https://packages.netlinux.co.uk/webhook/update-repo
